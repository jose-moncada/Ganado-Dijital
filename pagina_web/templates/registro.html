<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganado Dijital - Registro de Usuario</title>
    <link rel="icon" href="{% static 'img/logoGanadoDijital.png' %}">
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header{
            background-color: blue;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        h1{
            margin: 0;
        }

        #wlc{
            margin: 0 0 0 44px;
        }

        button{
            width: 130px;
            height: 40px;
            border: none;
            border-radius: 30px;
            background-color: white;
            transition: 700ms;
        }

        button:hover{
            width: 143px;
            height: 44px;
            transform: 700ms;
        }

        .cuadro{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        form{
            background-color: blue;
            color: white;
            display: flex;
            flex-direction: column;
            width: 300px;
            padding: 35px;
            border-radius: 20px;
            margin: 35px 0 0 0;
        }

        label{
            margin: 0 0 5px 0;
        }

        input{
            height: 30px;
            border: none;
            padding-left: 10px;
            background-color: white;
            border-radius: 30px;
            margin: 0 0 10px 0;
        }

        h2{
            margin: 0 0 10px 0;
        }
        
        a{
            color: white;
        }

        .btn{
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="header">
        {% load static %}

        <img src="{% static 'img/logoGanadoDijital.png' %}" alt="Logo Ganado Dijital" height="70px">
        <h1 id="wlc">GANADO DIJITAL</h1>
        <a href="{% url 'bienvenido' %}"><button>Mas Info</button></a>
    </div>
    <div class="cuadro">
        <form method="POST">
            <h2>Registrate</h2>
            {% csrf_token %}
            <label>Nombre:</label>
            <input type="text" name="nombre" placeholder="Nombre">
            <label>Correo:</label>
            <input type="email" name="email" placeholder="email@example.com" required>
            <label>Contraseña:</label>
            <input type="password" name="password" placeholder="Minimo 6 caracteres" required>
            <div class="btn">
                <button type="submit">Registrar</button>
            </div>
            <h3>¿Ya tienes cuenta?</h3>
            <a class="link" href="{% url 'login' %}">Inicia sesión</a>
            {% if mensaje %}
            <p class="{% if '✅' in mensaje %}success{% else %}error{% endif %}">
                {{ mensaje }}
            </p>
            {% endif %}
        </form>
    </div>
</body>
</html>
